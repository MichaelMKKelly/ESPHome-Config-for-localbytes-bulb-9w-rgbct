substitutions:
  name: "localbytes-bulb-9w-rgbct"
  friendly_name: "LocalBytes RGBCT Bulb"  

esphome:
  name: "${name}"
  name_add_mac_suffix: true
  friendly_name: "${friendly_name}"  
  project:
    name: "MichaelMKKelly.localbytes-bulb-9w-rgbct"
    version: "0.0.1"
  platformio_options:
    board_upload.flash_size: 2MB
    board_upload.maximum_size: 2097152
    board_build.ldscript: eagle.flash.2m.ld

esp8266:
  board: esp8285
  restore_from_flash: true

api:

ota:
  platform: esphome

wifi:
  ap:
    ssid: "${friendly_name}"
  min_auth_mode: WPA

factory_reset:
  resets_required: 7
  max_delay: 10s

logger:

captive_portal:

dashboard_import:
  package_import_url: github://MichaelMKKelly/ESPHome-Config-for-localbytes-bulb-9w-rgbct/localbytes-bulb-9w-rgbct.yaml