substitutions:  
  name: "lb-bulb-installer" 
  friendly_name: "LocalBytes Bulb Installer"
  version_number: "1.0.1"
  device_comment: "V${version_number} - Designed to install more useful Firmware - by MichaelMKKelly."
  wifi_min_auth: "WPA"
  ipv6_enable: "true"

esphome:
  name: "${name}"
  name_add_mac_suffix: true
  friendly_name: "${friendly_name}"
  comment: "${device_comment}"
  project:
    name: "MichaelMKKelly.lb-bulb-installer"
    version: "${version_number}"
  min_version: 2026.3.0
  on_boot: 
    then:
        - text_sensor.template.publish:
            id: installer_status
            state: ESPHome Loaded
esp8266:
  board: esp8285
  
ota:
  - platform: esphome
  - platform: web_server
  - platform: http_request
    on_begin: 
      then:
        - text_sensor.template.publish:
            id: installer_status
            state: "Starting..."
    on_progress: 
      then:
        - text_sensor.template.publish:
            id: installer_status
            state: "In Progress..."  
    on_end: 
      then:
        - text_sensor.template.publish:
            id: installer_status
            state: "Completed... Rebooting..."  
    on_error: 
      then:
        - text_sensor.template.publish:
            id: installer_status
            state: "Error..."  

wifi:
  ap:
    ssid: "${friendly_name}"
  min_auth_mode: "${wifi_min_auth}"

captive_portal:

safe_mode:  

web_server:
  port: 80
  version: 3

http_request:
  verify_ssl: False
  tls_buffer_size_rx: 16384

text_sensor:
  - platform: template
    name: 'Status'
    id: installer_status
    entity_category: 'diagnostic'

button:
  - platform: template
    name: "Install Latest Version of this Installer"
    on_press: 
      then:
        - ota.http_request.flash:
            url: https://michaelmkkelly.github.io/ESPHome-Config-for-localbytes-bulb-9w-rgbct/bulb-installer-tool/latest-binary/lb-bulb-installer.bin.gz
            md5_url: https://michaelmkkelly.github.io/ESPHome-Config-for-localbytes-bulb-9w-rgbct/bulb-installer-tool/latest-binary/lb-bulb-installer.bin.gz.md5

  - platform: template
    name: "Install MK's Localbytes Bulb FW"    
    on_press: 
        - ota.http_request.flash:
            url:  https://michaelmkkelly.github.io/ESPHome-Config-for-localbytes-bulb-9w-rgbct/latest-binary/localbytes-bulb.bin.gz
            md5_url: https://michaelmkkelly.github.io/ESPHome-Config-for-localbytes-bulb-9w-rgbct/latest-binary/localbytes-bulb.bin.gz.md5

  - platform: template
    name: "Install Tasmota Lite 15.3.0"
    on_press: 
      then:  
        - ota.http_request.flash:
            url: https://ota.tasmota.com/tasmota/release-15.3.0/tasmota-lite.bin.gz
            md5: "6dbd14a570c37fc93f26d3d0ed121cbf"