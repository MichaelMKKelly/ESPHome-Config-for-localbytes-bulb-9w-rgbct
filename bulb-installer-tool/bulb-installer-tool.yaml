substitutions:  
  name: "lb-bulb-installer"  
  friendly_name: "LocalBytes Bulb Installer"
  device_comment: "V0.0.1 of an ESPHome firmware for the LocalBytes Bulb, Designed to install other more useful Firmware. Firmware config by MichaelMKKelly."
  wifi_min_auth: "WPA"
  ipv6_enable: "true"

esphome:
  name: "${name}"
  name_add_mac_suffix: true
  friendly_name: "${friendly_name}"
  comment: "${device_comment}"
  project:
    name: "MichaelMKKelly.lb-bulb-installer"
    version: "0.0.1"
  min_version: 2025.12.0
  on_boot: 
    then:
        - text_sensor.template.publish:
            id: installer_status
            state: ESPHome Loaded
esp8266:
  board: esp8285
  
ota:
  - platform: esphome
  - platform: web_server
  - platform: http_request

wifi:
  ap:
    ssid: "${friendly_name}"
  min_auth_mode: "${wifi_min_auth}"

captive_portal:

safe_mode:  

web_server:
  port: 80

http_request:
  verify_ssl: False
  tls_buffer_size_rx: 16384

text_sensor:
  - platform: template
    name: 'Status'
    id: installer_status

button:
  - platform: template
    name: "Install Latest Version of this Installer"
    on_press: 
      then:
        - text_sensor.template.publish:
            id: installer_status
            state: Attempting to Flash Latest Version of this Installeer. (Please Wait Patiently)   
        - ota.http_request.flash:
            url: https://michaelmkkelly.github.io/ESPHome-Config-for-localbytes-bulb-9w-rgbct/bulb-installer-tool/latest-binary/lb-bulb-installer.bin
            md5_url: https://michaelmkkelly.github.io/ESPHome-Config-for-localbytes-bulb-9w-rgbct/bulb-installer-tool/latest-binary/lb-bulb-installer.bin.md5

  - platform: template
    name: "Install MichaelMKKelly's Localbytes Bulb Firmware"    
    on_press: 
      then:
        - text_sensor.template.publish:
            id: installer_status
            state: Attempting to Flash MK LB Firmware. (Please Wait Patiently)   
        - ota.http_request.flash:
            url: https://github.com/MichaelMKKelly/ESPHome-Config-for-localbytes-bulb-9w-rgbct/releases/download/0.2.0/localbytes-bulb.bin
            md5_url: https://github.com/MichaelMKKelly/ESPHome-Config-for-localbytes-bulb-9w-rgbct/releases/download/0.2.0/localbytes-bulb.bin.md5

  - platform: template
    name: "Install Tasmota Lite 15.3.0"
    on_press: 
      then:
        - text_sensor.template.publish:
            id: installer_status
            state: Attempting to Flash Tasmota. (Please Wait Patiently)    
        - ota.http_request.flash:
            url: https://ota.tasmota.com/tasmota/release/tasmota-lite.bin
            md5: "4ad2d4b36790318c90976b4dd6fae4c7"